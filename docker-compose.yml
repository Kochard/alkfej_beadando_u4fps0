services:
  mongo:
    image: mongo:latest
    container_name: measurement-results-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend-api/CertificateStore.Api
    container_name: measurement-results-backend
    depends_on:
      - mongo
    ports:
      - "5202:8080"

  mcp:
    build:
      context: ./backend-api/CertificateStore.Mcp
    container_name: measurement-results-mcp
    depends_on:
      - mongo
    ports:
      - "8081:8080"
    environment:
      - MongoDbSettings__ConnectionString=mongodb://mongo:27017
      - MongoDbSettings__DatabaseName=measurementdb

  frontend:
    build:
      context: ./frontend/certificate-store-frontend
    container_name: measurement-results-frontend
    depends_on:
      - backend
    ports:
      - "4200:80"

volumes:
  mongo_data: