name: Build and Push Docker Images

# Trigger build

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set GHCR username
        run: echo "GHCR_USERNAME=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ env.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push backend image
        run: |
          OWNER=$(echo ${{ github.repository }} | cut -d'/' -f1)
          REPO=$(echo ${{ github.repository }} | cut -d'/' -f2)
          OWNER_LOWER=$(echo $OWNER | tr '[:upper:]' '[:lower:]')
          REPO_LOWER=$(echo $REPO | tr '[:upper:]' '[:lower:]')
          docker build -t ghcr.io/$OWNER_LOWER/$REPO_LOWER/backend:latest ./backend-api/CertificateStore.Api
          docker push ghcr.io/$OWNER_LOWER/$REPO_LOWER/backend:latest

      - name: Build and push frontend image
        run: |
          OWNER=$(echo ${{ github.repository }} | cut -d'/' -f1)
          REPO=$(echo ${{ github.repository }} | cut -d'/' -f2)
          OWNER_LOWER=$(echo $OWNER | tr '[:upper:]' '[:lower:]')
          REPO_LOWER=$(echo $REPO | tr '[:upper:]' '[:lower:]')
          docker build -t ghcr.io/$OWNER_LOWER/$REPO_LOWER/frontend:latest ./frontend/certificate-store-frontend
          docker push ghcr.io/$OWNER_LOWER/$REPO_LOWER/frontend:latest

      - name: Build and push MCP image
        run: |
          OWNER=$(echo ${{ github.repository }} | cut -d'/' -f1)
          REPO=$(echo ${{ github.repository }} | cut -d'/' -f2)
          OWNER_LOWER=$(echo $OWNER | tr '[:upper:]' '[:lower:]')
          REPO_LOWER=$(echo $REPO | tr '[:upper:]' '[:lower:]')
          docker build -t ghcr.io/$OWNER_LOWER/$REPO_LOWER/mcp:latest ./backend-api/CertificateStore.Mcp
          docker push ghcr.io/$OWNER_LOWER/$REPO_LOWER/mcp:latest