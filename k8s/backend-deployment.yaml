apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/kochard/alkfej_beadando_u4fps0/backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: MongoDbSettings__ConnectionString
              value: "mongodb://mongo:27017"
---
apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  selector:
    app: backend
  ports:
    - port: 80
      targetPort: 8080