apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: measurement-results-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Kochard/alkfej_beadando_u4fps0.git
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true